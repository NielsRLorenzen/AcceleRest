model_type: accelformer
cv_folds_path: /oak/stanford/groups/mignot/projects/actigraphy_fm/data/splits/tbi/folds
n_folds: 5

# Accelerometry decomposistion parameters
acc_decomp: true
sample_freq: 30
# Classifier parameters
finetune_mode: token_wise
num_lstm_layers: 0
num_classes: 4
head_dropout: 0.4
# Encoder parameters
patch_size: 900  # Number of samples per token
embed_dim: 128  # Embedding dimension size
seq_len: 256  # Sequence length
num_heads: 4  # Number of attention heads in transformer
mlp_ratio: 2  # Ratio of hidden units in the MLP to the embedding dimension
n_encoder_layers: 6  # Number of layers in the encoder
encoder_dropout: 0.4  # Dropout rate for the encoder

# Dataset parameters
# patch_size_samples = patch_size
# context_window_patches = seq_len
step_patches: 12 # ~ 95% overlap between adjacent windows/ 6-minute steps
labels: light_deep_rem
label_map:
    deep: 0
    light: 1
    rem: 2
    wake: 3
    missing: -9
label_priority: false
patches_per_label: 1
ignore_index: -9
class_weights: null
downsample_negative: null

# Dataloader parameters
batch_size: 512
num_workers: 8
prefetch_factor: 2
pin_memory: true

# Optimizer parameters
lr: 0.001
blr: null
weight_decay: 0.01

# Training parameters
n_folds: 5
train_prcnt: 1.0
adjust_max_epochs: false
use_sdpa: true
max_epochs: 100
grad_norm_max: 1.0
grad_accumulation_steps: 1
mixed_precision: true
patience: 1000
seed: 42
log_interval: 10